name: CI

# When to run: on every push to any branch, and on PRs targeting develop or main
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
      # 1. Download the repository code onto the CI machine
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install .NET 8 and 9 SDKs — global.json pins 9.x locally, projects target net8.0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      # 3. Restore NuGet packages (cached between runs for speed)
      - name: Restore dependencies
        run: dotnet restore

      # 4. Build the entire solution — fails if any project has compile errors
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # 5. Run all tests — unit + integration (InMemory) + E2E (WebApplicationFactory)
      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
